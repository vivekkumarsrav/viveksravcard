<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivek Profile Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fdecba, #fff4c8);
            padding: 20px;
        }


        .profile-card {
            width: 850px;
            height: 340px;
            background: orange;
            background: linear-gradient(135deg, #ffebaf, #ffe299);
            border-radius: 20px;
            padding: 35px;
            display: flex;
            gap: 30px;
            align-items: center;
            box-shadow: 1px 1px 15px 1px rgb(0, 0, 0);
        }

        .profile-card:hover {
            box-shadow: 1px 1px 25px 1px rgb(26, 25, 25);
            background: linear-gradient(135deg, #ffe299, #ffebaf);
            transform: 0.2s;

        }


        .left-section {
            flex: 1;
            color: white;
        }

        .left-section h1 {
            font-size: 38px;
            margin-bottom: 20px;
            color: black;
        }

        .left-section p {
            font-size: 18px;
            line-height: 1.5;
            color: black;
            margin-bottom: 8px;
        }


        .social-icons {
            margin-top: 30px;
            display: flex;
            gap: 18px;
            /* flex-wrap: wrap; */
        }

        .social-icons a {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            background: rgba(19, 19, 19, 0.772);
            color: white;
            font-size: 20px;
            transition: 0.2s;
        }

        .social-icons a:hover {
            background: orange;
            box-shadow: 0.5px 1px 18px 1px black;
            transform: translateY(-5px);
        }

        /* Right Side */

        .right-section {
            width: 240px;
            height: 280px;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid black;
        }

        .right-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .right-section img:hover {
            transform: translate3d(-5px);
        }

        #vks {
            font-family: sans-serif;
            font-weight: bold;
            color: black;
            width: 25ch;
            text-wrap: nowrap;
            overflow: hidden;
            animation: typing 3s steps(20) infinite alternate-reverse;
        }

        @keyframes typing {
            from {
                width: 0;

            }
        }


        @media(max-width:768px) {

            .profile-card {
                flex-direction: column-reverse;
                text-align: center;
                width: 100%;
            }

            .social-icons {
                justify-content: center;
            }

            .right-section {
                width: 220px;
                height: 220px;
            }

            .left-section h1 {
                font-size: 30px;
            }

        }
    </style>
</head>

<body>

    <div class="profile-card">

        <div class="left-section">

            <h1>Vivek K. SRAV</h1>

            <p>
                BCA Student • Web Developer • Founder of Vishept
                Building digital solutions and growing my tech journey step by step.

            </p>
            <p id="vks">Grow with Vivek K. SRAV</p>


            <div class="social-icons">
                <a href="https://www.youtube.com/@vivekkumar-srav" target="_blank">
                    <i class="fab fa-youtube"></i>
                </a>

                <a href="https://www.instagram.com/vivekkumarsrav/" target="_blank">
                    <i class="fab fa-instagram"></i>
                </a>

                <a href="https://www.facebook.com/vivekkumarsrav/" target="_blank">
                    <i class="fab fa-facebook-f"></i>
                </a>

                <a href="https://x.com/VivekKumar53689" target="_blank">
                    <i class="fab fa-x-twitter"></i>
                </a>

                <a href="https://www.linkedin.com/in/vivekkumarsrav/" target="_blank">
                    <i class="fab fa-linkedin-in"></i>
                </a>

            </div>

            <!-- <p class="contacts"><a href="connect.viveksrav@gmail.com" target="_blank">connect.viveksrav@gmail.com</a></p> -->

        </div>


        <div class="right-section">
            <img src="vivekkumar-srav.jpg" alt="Profile Photo">
        </div>

    </div>

</body>

</html>
